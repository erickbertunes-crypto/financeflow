<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--surface:#12151c;--surface2:#181c26;--surface3:#1f2435;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --accent:#5eead4;--accent2:#f472b6;--accent3:#fb923c;--accent4:#60a5fa;--accent5:#a78bfa;
  --text:#eef0f8;--text2:#7a84a0;--text3:#444e68;
  --red:#f87171;--yellow:#fbbf24;--radius:16px;--rsm:10px;--sidebar:252px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(94,234,212,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(94,234,212,.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
/* SCREENS */
.screen{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center}
.screen.hidden{display:none!important}
/* AUTH */
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:40px;width:420px;max-width:95vw;position:relative;z-index:1}
.auth-card::before{content:'';position:absolute;inset:0;border-radius:24px;background:radial-gradient(ellipse 120% 80% at 50% -20%,rgba(94,234,212,.07),transparent);pointer-events:none}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.auth-logo-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.auth-logo-sub{font-size:11px;color:var(--text3);letter-spacing:.3px}
.auth-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .2s}
.auth-tab.active{background:var(--surface3);color:var(--text)}
.form-group{margin-bottom:15px}
.form-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:6px;display:block;letter-spacing:.4px;text-transform:uppercase}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.form-input option{background:var(--surface2)}
.btn-auth{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent4));color:#0a0c10;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:2px}
.btn-auth:hover{opacity:.9;transform:translateY(-1px)}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:14px;display:none}
.auth-err.show{display:block}
/* LOADING */
.spinner{width:38px;height:38px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* APP */
.app-wrap{display:flex;min-height:100vh;position:relative;z-index:1}
/* SIDEBAR */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 0;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:0 18px 22px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.logo-sub{font-size:9.5px;color:var(--text3);letter-spacing:.4px;display:flex;align-items:center;gap:3px}
.sync-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{padding:14px 10px;flex:1;overflow-y:auto}
.nav-sec{font-size:9px;letter-spacing:1.5px;color:var(--text3);font-weight:600;padding:0 10px;margin:16px 0 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px;border-radius:var(--rsm);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(94,234,212,.12),rgba(96,165,250,.07));color:var(--accent);border-color:rgba(94,234,212,.18)}
.ni{font-size:14px;width:18px;text-align:center}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent5),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:10.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-nav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.month-btn{background:var(--surface3);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0}
.month-btn:hover{color:var(--accent);border-color:var(--accent)}
.month-label{font-size:12.5px;color:var(--text);font-weight:500;flex:1;text-align:center}
.btn-logout{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
/* MAIN */
.main{margin-left:var(--sidebar);flex:1;padding:28px 28px 48px}
.page{display:none}
.page.active{display:block}
.page-hdr{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-family:'Syne',sans-serif;font-size:25px;font-weight:800}
.page-sub{color:var(--text2);font-size:12.5px;margin-top:3px}
/* CARDS */
.cg4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.cg3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.c-teal::after{background:linear-gradient(90deg,var(--accent),transparent)}
.card.c-pink::after{background:linear-gradient(90deg,var(--accent2),transparent)}
.card.c-blue::after{background:linear-gradient(90deg,var(--accent4),transparent)}
.card.c-orange::after{background:linear-gradient(90deg,var(--accent3),transparent)}
.card.c-purple::after{background:linear-gradient(90deg,var(--accent5),transparent)}
.card.c-yellow::after{background:linear-gradient(90deg,var(--yellow),transparent)}
.card-lbl{font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:9px}
.card-val{font-family:'Syne',sans-serif;font-size:21px;font-weight:700}
.card-val.neg{color:var(--red)}.card-val.pos{color:var(--accent)}
.card-sub2{font-size:10.5px;color:var(--text3);margin-top:5px}
.card-avg{font-size:10px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;align-items:center;gap:4px}
.card-avg .avg-up{color:#86efac}.card-avg .avg-down{color:var(--red)}.card-avg .avg-eq{color:var(--text3)}
.card-ico{position:absolute;top:14px;right:14px;font-size:19px;opacity:.22}
/* CHARTS */
.charts2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.chart-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;margin-bottom:14px}
.chart-wrap{position:relative;height:190px}
/* SECTION */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.sec-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700}
/* BUTTONS */
.btn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent4));color:#0a0c10;font-weight:700}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.25);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-sm{padding:4px 9px;font-size:10.5px}
.btn-icon{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 5px;border-radius:4px;transition:color .15s;font-size:12px}
.btn-icon:hover{color:var(--red)}
/* TX LIST */
.tx-list{max-height:430px;overflow-y:auto}
.tx-list::-webkit-scrollbar{width:3px}
.tx-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.tx-item{display:grid;grid-template-columns:18px 1fr auto auto;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.tx-item:last-child{border-bottom:none}
.tx-item:hover{background:var(--surface2)}
.tx-dot{width:8px;height:8px;border-radius:50%}
.tx-name{font-size:13px;font-weight:500}
.tx-meta{font-size:10.5px;color:var(--text3);margin-top:2px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tx-amt{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:700;text-align:right;white-space:nowrap}
.tx-amt.expense{color:var(--red)}.tx-amt.income{color:var(--accent)}
.empty-st{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-ico{font-size:30px;margin-bottom:10px;opacity:.4}
.empty-txt{font-size:12.5px}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9.5px;font-weight:600;line-height:1.5}
.b-ok{background:rgba(94,234,212,.15);color:var(--accent)}
.b-err{background:rgba(248,113,113,.15);color:var(--red)}
.b-warn{background:rgba(251,191,36,.15);color:var(--yellow)}
.b-info{background:rgba(96,165,250,.15);color:var(--accent4)}
.b-purple{background:rgba(167,139,250,.15);color:var(--accent5)}
.b-orange{background:rgba(251,146,60,.15);color:var(--accent3)}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(6px)}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:26px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:11px}
.type-toggle{display:flex;gap:6px;margin-bottom:11px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text2)}
.type-btn.expense.active{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.type-btn.income.active{background:rgba(94,234,212,.15);border-color:var(--accent);color:var(--accent)}
.modal-foot{display:flex;gap:8px;margin-top:16px}
.modal-foot .btn{flex:1;padding:11px;text-align:center}
.parcel-sec{display:none}
.parcel-hint{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:9px 13px;font-size:11.5px;color:var(--accent4);margin-bottom:10px}
/* PROGRESS */
.prog-bg{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s ease}
/* FILTER */
.filter-bar{display:flex;gap:6px;padding:11px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0c10;font-weight:600}
.search-wrap{position:relative}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 11px 7px 30px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:180px;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3)}
/* BUDGET */
.budget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bud-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.bud-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bud-cat{display:flex;align-items:center;gap:8px}
.bud-dot{width:8px;height:8px;border-radius:50%}
.bud-name{font-size:12.5px;font-weight:600}
.bud-amts{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text3);margin-bottom:6px}
.bud-pct{font-size:10px;color:var(--text3);margin-top:4px;text-align:right}
/* CREDIT CARD */
.cc-visual{background:linear-gradient(135deg,#181c26,#1f2435);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden;min-height:148px}
.cc-visual::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(94,234,212,.1),transparent);top:-60px;right:-40px}
.cc-visual::after{content:'';position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,.07),transparent);bottom:-50px;left:20px}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:6px 15px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--surface3);color:var(--text)}
/* CASHFLOW TABLE */
.cf-wrap{overflow-x:auto}
.cf-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.cf-table th{padding:9px 14px;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.cf-table th:first-child{text-align:left}
.cf-table td{padding:10px 14px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.cf-table td:first-child{text-align:left;font-weight:500}
.cf-table tr.subtotal td{background:rgba(255,255,255,.02);font-weight:700}
.cf-table .pos{color:var(--accent)}.cf-table .neg{color:var(--red)}
.cf-table tr.patrimonio td{background:rgba(167,139,250,.08);font-weight:700;border-top:2px solid rgba(167,139,250,.25)}
.cf-table .purple{color:var(--accent5)}
/* INSTALL TABLE */
.inst-wrap{overflow-x:auto}
.inst-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:680px}
.inst-table th{padding:9px 16px;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.inst-table td{padding:11px 16px;border-bottom:1px solid var(--border)}
.inst-table tr:last-child td{border-bottom:none}
.inst-table tr:hover td{background:var(--surface2)}
/* INSTALLMENT GROUP CARDS */
.inst-group{border-bottom:1px solid var(--border);padding:14px 18px;transition:background .15s}
.inst-group:last-child{border-bottom:none}
.inst-group:hover{background:var(--surface2)}
.inst-group-hdr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.inst-group-title{font-size:13.5px;font-weight:600;flex:1}
.inst-group-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.inst-progress{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:8px}
.inst-progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.inst-month-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border)}
.inst-month-item:last-child{border-bottom:none}
.inst-month-item:hover{background:var(--surface2)}
/* AUTOCOMPLETE */
.ac-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .15s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--surface3)}
.ac-item-name{font-size:13px;font-weight:500;flex:1}
.ac-item-meta{font-size:10.5px;color:var(--text3)}
/* IMPORT */
.import-item{padding:12px 18px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:20px 1fr auto;gap:12px;align-items:start;transition:background .15s}
.import-item:last-child{border-bottom:none}
.import-item:hover{background:var(--surface2)}
.import-item-dup{opacity:.5;background:rgba(248,113,113,.04)}
.import-field{background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
.import-field:focus{border-color:var(--accent)}
.import-field option{background:var(--surface2)}
/* CHECKBOX / BULK SELECT */
.tx-item-wrap{position:relative}
.tx-chk{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.tx-item.selected{background:rgba(94,234,212,.06);border-left:2px solid var(--accent)}
.bulk-bar-active{display:flex!important}
.cat-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px 6px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-weight:500;cursor:default;transition:all .15s}
.cat-chip:hover{border-color:var(--border2)}
.cat-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-chip-actions{display:flex;gap:2px;margin-left:2px}
.cat-chip-btn{background:none;border:none;cursor:po

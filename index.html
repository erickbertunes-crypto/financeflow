<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Upload</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px;margin:0}
.box{background:#222;border-radius:12px;padding:20px;margin-bottom:16px}
.btn-area{position:relative;border-radius:12px;overflow:hidden;margin-bottom:12px}
.btn-area input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;font-size:16px}
.btn-visual{background:#1a3a3a;border:2px solid #5eead4;border-radius:12px;padding:24px;text-align:center;pointer-events:none}
.btn-visual .icon{font-size:36px;display:block;margin-bottom:8px}
.btn-visual .label{font-size:15px;font-weight:700;display:block}
.btn-visual .sub{font-size:11px;color:#7a84a0;display:block;margin-top:4px}
#status{padding:12px;border-radius:8px;background:#1a2a1a;border:1px solid #5eead4;min-height:40px;margin-bottom:12px;font-size:13px;word-break:break-all}
#preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
#preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #5eead4}
#log{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;max-height:200px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<div class="box">
  <h2 style="margin:0 0 16px">Teste de Upload de Imagem</h2>

  <div class="btn-area">
    <input type="file" multiple accept="image/*" id="inp1">
    <div class="btn-visual">
      <span class="icon">🖼️</span>
      <span class="label">Galeria (múltiplas)</span>
      <span class="sub">Toque aqui</span>
    </div>
  </div>

  <div class="btn-area">
    <input type="file" accept="image/*" capture="environment" id="inp2">
    <div class="btn-visual">
      <span class="icon">📷</span>
      <span class="label">Câmera</span>
      <span class="sub">Toque aqui</span>
    </div>
  </div>

  <div id="status">Aguardando seleção...</div>
  <div id="preview"></div>
  <div id="log">Log de eventos:\n</div>
</div>

<script>
function log(msg){
  const el=document.getElementById('log');
  el.textContent+=new Date().toLocaleTimeString()+' | '+msg+'\n';
  el.scrollTop=el.scrollHeight;
}

function status(msg,color){
  const el=document.getElementById('status');
  el.textContent=msg;
  el.style.borderColor=color||'#5eead4';
}

function handleFiles(files, src){
  log('handleFiles chamado de: '+src+' | files.length='+files.length);
  if(!files||files.length===0){
    log('ERRO: nenhum arquivo recebido');
    status('Nenhum arquivo recebido!','#f87171');
    return;
  }
  status('✓ '+files.length+' arquivo(s) selecionado(s) - lendo...','#fbbf24');

  Array.from(files).forEach((file,i)=>{
    log('Arquivo '+i+': name='+file.name+' type='+file.type+' size='+file.size);

    if(!file.type.startsWith('image/')){
      log('AVISO: não é imagem: '+file.type);
      return;
    }

    const reader=new FileReader();
    reader.onloadstart=()=>log('FileReader iniciou para: '+file.name);
    reader.onprogress=e=>log('Progress: '+e.loaded+'/'+e.total);
    reader.onload=function(e){
      log('FileReader.onload OK! tamanho b64='+e.target.result.length);
      status('✓ Imagem carregada! '+file.name+' ('+Math.round(file.size/1024)+'KB)','#86efac');

      // Show thumbnail
      const prev=document.getElementById('preview');
      const img=document.createElement('img');
      img.src=e.target.result;
      prev.appendChild(img);
      log('Thumbnail adicionado ao DOM');
    };
    reader.onerror=function(e){
      log('ERRO FileReader: '+e);
      status('Erro ao ler arquivo!','#f87171');
    };
    reader.onabort=()=>log('FileReader abortado!');

    log('Chamando reader.readAsDataURL...');
    reader.readAsDataURL(file);
  });
}

// Wire via addEventListener
document.getElementById('inp1').addEventListener('change',function(e){
  log('inp1 change event! files='+this.files.length);
  handleFiles(this.files,'inp1-galeria');
  this.value='';
});

document.getElementById('inp2').addEventListener('change',function(e){
  log('inp2 change event! files='+this.files.length);
  handleFiles(this.files,'inp2-camera');
  this.value='';
});

log('Página carregada. Inputs wired.');
log('UA: '+navigator.userAgent.substr(0,80));
</script>
</body>
</html>
